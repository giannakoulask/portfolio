backend:
  name: git-gateway
  branch: main
  login: true
  roles: ["admin", "editor"]

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:

  # =====================
  # 🌍 PAGES (EN + DE)
  # =====================
  - name: "pages"
    label: "Pages"
    files:

      # 🏠 Welcome
      - name: "welcome_en"
        label: "Welcome (EN)"
        file: "welcome.en.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Main Image", name: "image", widget: "image" }
          - { label: "Text", name: "body", widget: "markdown" }

      - name: "welcome_de"
        label: "Welcome (DE)"
        file: "welcome.de.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Main Image", name: "image", widget: "image" }
          - { label: "Text", name: "body", widget: "markdown" }

      # 👤 About
      - name: "about_en"
        label: "About (EN)"
        file: "about.en.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Main Image", name: "image", widget: "image" }

          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Category Title", name: "title", widget: "string" }

              - label: "Entries"
                name: "entries"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "From", name: "from", widget: "datetime" }
                  - { label: "To", name: "to", widget: "datetime", required: false }
                  - { label: "Location", name: "location", widget: "string", required: false }
                  - { label: "Description", name: "description", widget: "text", required: false }

      - name: "about_de"
        label: "About (DE)"
        file: "about.de.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Main Image", name: "image", widget: "image" }

          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Category Title", name: "title", widget: "string" }

              - label: "Entries"
                name: "entries"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "From", name: "from", widget: "datetime" }
                  - { label: "To", name: "to", widget: "datetime", required: false }
                  - { label: "Location", name: "location", widget: "string", required: false }
                  - { label: "Description", name: "description", widget: "text", required: false }

      # 📞 Contact
      - name: "contact_en"
        label: "Contact (EN)"
        file: "contact.en.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Text", name: "body", widget: "markdown" }

          - label: "Contacts"
            name: "contacts"
            widget: "list"
            fields:
              - { label: "Type", name: "type", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }

      - name: "contact_de"
        label: "Contact (DE)"
        file: "contact.de.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Text", name: "body", widget: "markdown" }

          - label: "Contacts"
            name: "contacts"
            widget: "list"
            fields:
              - { label: "Type", name: "type", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }

  # =====================
  # 🎨 PROJECTS (Portfolio)
  # =====================
  - name: "projects"
    label: "Projects"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }